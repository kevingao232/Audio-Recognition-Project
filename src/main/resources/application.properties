spring.application.name=audio-fingerprint

# Server
server.port=8080

# Database file location (relative to working directory)
audiofp.database.path=fingerprints.json

# Allow large WAV file uploads (up to 100 MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.com.audiofp=DEBUG
